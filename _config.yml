# ===============================
# Site Settings
# ===============================
title: "Daniel Scheuchenstuhl"
description: "Physical AI Engineer specializing in autonomous systems that perceive, reason, and act in complex real-world environments"
url: "https://dscheuchenstuhl.github.io"
baseurl: ""
og_image: "/user_assets/images/profile.jpg"
twitter:
  card: "summary"

# ===============================
# Theme
# ===============================
remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: "default"   # light theme

masthead_title: " "

# ===============================
# Author
# ===============================
author:
  name: "Daniel Scheuchenstuhl"
  avatar: "/user_assets/images/profile.jpg"   # optional
  bio: "Physical AI Engineer — building autonomous systems that perceive, reason, and act in complex real-world environments"
  location: "Vienna, Austria"
  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:daniel.scheuchenstuhl@gmx.at"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/dscheuchenstuhl"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/daniel-scheuchenstuhl-029770217/"

# ===============================
# Collections
# ===============================
collections:
  portfolio:
    output: true
    permalink: /portfolio/:name/
    order:
      - project-e2e-deployment-of-vision-language-action-models.md
      - project-e2e-deployment-of-industrial-vision-foundation-models.md
      - project-industrial-ai-vision-blueprint.md
      - project-10th-f1tenth-autonomous-grand-prix.md
      - project-9th-f1tenth-autonomous-grand-prix.md

# ===============================
# Defaults
# ===============================
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false

# ===============================
# Plugins (GitHub Pages Safe)
# ===============================
plugins:
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-sitemap

# ===============================
# Markdown
# ===============================
markdown: kramdown
highlighter: rouge

# ===============================
# Footer
# ===============================
atom_feed:
  hide: true

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/dscheuchenstuhl"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/daniel-scheuchenstuhl-029770217/"
